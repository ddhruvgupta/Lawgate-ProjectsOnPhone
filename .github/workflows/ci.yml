name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — build + unit tests
  # ---------------------------------------------------------------------------
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore LegalDocSystem.sln

      - name: Build
        run: dotnet build LegalDocSystem.sln --no-restore --configuration Release

      - name: Unit tests
        run: >
          dotnet test LegalDocSystem.UnitTests/LegalDocSystem.UnitTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: backend/**/*.trx

  # ---------------------------------------------------------------------------
  # Backend — integration tests (real PostgreSQL via Testcontainers)
  # ---------------------------------------------------------------------------
  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore LegalDocSystem.sln

      - name: Build
        run: dotnet build LegalDocSystem.sln --no-restore --configuration Release

      - name: Integration tests
        run: >
          dotnet test LegalDocSystem.IntegrationTests/LegalDocSystem.IntegrationTests.csproj
          --configuration Release
          --logger "trx;LogFileName=integration-results.trx"
        env:
          DOTNET_ENVIRONMENT: Testing
          # Testcontainers: disable Ryuk container (cleanup daemon) — not needed in CI and can cause permission issues
          TESTCONTAINERS_RYUK_DISABLED: "true"
          # Ensure Testcontainers can reach the Docker daemon on GitHub Actions ubuntu-latest
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/**/*.trx

  # ---------------------------------------------------------------------------
  # Frontend — type-check + lint + unit tests
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --max-warnings 0

      - name: Unit tests
        run: npm test -- --reporter=verbose

      - name: Build (verify no compilation errors)
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.azurewebsites.net/api
          VITE_APP_NAME: Lawgate
          VITE_APP_VERSION: 1.0.0
