name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip EF Core migrations'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-backend
  cancel-in-progress: false  # Never cancel an in-flight deployment

jobs:
  deploy:
    name: Build, Migrate & Deploy Backend
    runs-on: ubuntu-latest
    environment: production   # Requires manual approval if configured in repo settings

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # -----------------------------------------------------------------------
      # Build & publish
      # -----------------------------------------------------------------------
      - name: Restore
        working-directory: backend
        run: dotnet restore LegalDocSystem.sln

      - name: Build & publish
        working-directory: backend
        run: |
          dotnet publish LegalDocSystem.API/LegalDocSystem.API.csproj \
            --configuration Release \
            --output publish \
            --runtime linux-x64 \
            --self-contained false

      - name: Create deployment zip
        working-directory: backend
        run: zip -r deploy-backend.zip publish/

      # -----------------------------------------------------------------------
      # EF Core migrations
      # -----------------------------------------------------------------------
      - name: Run EF Core migrations
        if: ${{ github.event.inputs.skip_migrations != 'true' }}
        working-directory: backend/LegalDocSystem.API
        run: dotnet ef database update --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_DATABASE_CONNECTION_STRING }}
          Jwt__SecretKey: ${{ secrets.JWT_SECRET_KEY }}

      # -----------------------------------------------------------------------
      # Deploy to Azure App Service
      # -----------------------------------------------------------------------
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: backend/deploy-backend.zip

      - name: Verify health check
        run: |
          echo "Waiting 30s for app to start..."
          sleep 30
          curl --fail --silent "${{ secrets.AZURE_API_URL }}/health" | jq .
