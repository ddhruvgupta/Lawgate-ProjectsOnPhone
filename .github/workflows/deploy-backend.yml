name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip EF Core migrations'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-backend
  cancel-in-progress: false  # Never cancel an in-flight deployment

jobs:
  deploy:
    name: Build, Migrate & Deploy Backend
    runs-on: ubuntu-latest
    environment: production   # Requires manual approval if configured in repo settings

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # -----------------------------------------------------------------------
      # Login to Azure early — needed for both firewall management and deploy
      # -----------------------------------------------------------------------
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # -----------------------------------------------------------------------
      # Build & publish
      # -----------------------------------------------------------------------
      - name: Restore
        working-directory: backend
        run: dotnet restore LegalDocSystem.API/LegalDocSystem.API.csproj --runtime linux-x64

      - name: Build
        working-directory: backend
        run: dotnet build LegalDocSystem.API/LegalDocSystem.API.csproj --no-restore --configuration Release --runtime linux-x64

      - name: Publish
        working-directory: backend
        run: |
          dotnet publish LegalDocSystem.API/LegalDocSystem.API.csproj \
            --configuration Release \
            --no-build \
            --runtime linux-x64 \
            --self-contained false \
            --output publish

      - name: Create deployment zip
        working-directory: backend/publish
        run: zip -r ../deploy-backend.zip .

      # -----------------------------------------------------------------------
      # EF Core migrations
      # -----------------------------------------------------------------------
      - name: Install EF Core tools
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_migrations != 'true' }}
        run: dotnet tool install --global dotnet-ef

      - name: Open PostgreSQL firewall for CI runner
        # Only runs on manual dispatch — GitHub runners cannot reach a VNet-injected (private)
        # PostgreSQL server on push events, so migrations are skipped and delegated to
        # Program.cs startup migration on App Service (which is VNet-integrated).
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_migrations != 'true' }}
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          # Start server if stopped
          az postgres flexible-server start \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} 2>/dev/null || true
          sleep 15
          # Ensure public access is enabled
          az postgres flexible-server update \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --public-access enabled 2>/dev/null || true
          # Add runner IP to firewall
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --rule-name "GitHubActions-${{ github.run_id }}" \
            --start-ip-address $RUNNER_IP \
            --end-ip-address $RUNNER_IP

      - name: Run EF Core migrations
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_migrations != 'true' }}
        working-directory: backend/LegalDocSystem.API
        run: dotnet ef database update --no-build
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_DATABASE_CONNECTION_STRING }}

      - name: Close PostgreSQL public access after migrations
        # Runs whenever the firewall was opened (workflow_dispatch + migrations not skipped),
        # even if the migration step failed — ensures the DB is never left publicly accessible.
        if: ${{ always() && github.event_name == 'workflow_dispatch' && github.event.inputs.skip_migrations != 'true' }}
        run: |
          set -euo pipefail

          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --rule-name "GitHubActions-${{ github.run_id }}" \
            --yes 2>/dev/null || true

          az postgres flexible-server update \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --public-access disabled

          public_access_state="$(az postgres flexible-server show \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query 'network.publicNetworkAccess' \
            --output tsv)"

          if [ "${public_access_state}" != "Disabled" ]; then
            echo "Expected PostgreSQL public access to be Disabled, but found '${public_access_state}'."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Deploy to Azure App Service
      # -----------------------------------------------------------------------
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: backend/deploy-backend.zip

      - name: Verify health check
        run: |
          echo "Waiting 45s for app to start..."
          sleep 45
          curl --fail --silent "${{ secrets.AZURE_API_URL }}/health"
