services:
  postgres:
    image: postgres:16-alpine
    container_name: lawgate-postgres
    environment:
      POSTGRES_DB: lawgate_db
      POSTGRES_USER: lawgate_user
      POSTGRES_PASSWORD: lawgate_dev_password_change_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - lawgate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawgate_user -d lawgate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: lawgate-azurite
    hostname: azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    networks:
      - lawgate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection({port:10000,host:'localhost'}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: lawgate-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=lawgate_db;Username=lawgate_user;Password=lawgate_dev_password_change_in_production
      - ConnectionStrings__BlobStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      - Storage__PublicBlobEndpoint=http://localhost:10000
      - ASPNETCORE_URLS=http://+:8080
      - App__FrontendBaseUrl=http://localhost:5174
    ports:
      - "5059:8080"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
    networks:
      - lawgate-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: lawgate-frontend
    environment:
      - VITE_API_URL=http://localhost:5059/api
    ports:
      - "5174:5173"
    depends_on:
      - backend
    networks:
      - lawgate-network
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  azurite_data:

networks:
  lawgate-network:
    driver: bridge
