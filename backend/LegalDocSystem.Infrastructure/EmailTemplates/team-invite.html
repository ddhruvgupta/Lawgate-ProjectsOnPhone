<!DOCTYPE html>
<html lang="en">
<body style="font-family:sans-serif;color:#1a1a1a;max-width:600px;margin:auto;padding:24px;">
  <h2 style="color:#1d4ed8;">You've been added to {{companyName}}</h2>
  <p>Hi {{firstName}},</p>
  <p>{{invitedByName}} has added you to <strong>{{companyName}}</strong> on Lawgate.</p>

  <h3 style="margin-top:24px;color:#374151;">Your login details</h3>
  <table style="border-collapse:collapse;width:100%;margin-bottom:8px;">
    <tr>
      <td style="padding:8px 0;color:#6b7280;width:180px;">Email</td>
      <td style="padding:8px 0;font-weight:600;">{{email}}</td>
    </tr>
    <tr>
      <td style="padding:8px 0;color:#6b7280;">Temporary password</td>
      <td style="padding:8px 0;font-weight:600;font-family:monospace;letter-spacing:0.05em;">{{temporaryPassword}}</td>
    </tr>
  </table>

  <p style="text-align:center;margin:32px 0;">
    <a href="{{loginUrl}}"
       style="background:#1d4ed8;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:600;">
      Log in to Lawgate
    </a>
  </p>

  <p style="color:#6b7280;font-size:13px;">
    Please change your password after your first sign-in.
  </p>
  <hr style="border:none;border-top:1px solid #e5e7eb;margin:24px 0;"/>
  <p style="color:#9ca3af;font-size:12px;">The Lawgate Team</p>
</body>
</html>
